<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
<title>Kat &amp; Steve's Family FinanceVault</title>
<meta name="description" content="Scan a bill and it organizes itself. Private family finance vault for Kat &amp; Steve."/>
<meta name="theme-color" content="#14110D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FinanceVault"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2314110D'/%3E%3Ccircle cx='90' cy='90' r='52' fill='none' stroke='%23E9C46A' stroke-width='9'/%3E%3Ccircle cx='90' cy='90' r='16' fill='%23E9C46A'/%3E%3Cg stroke='%23E9C46A' stroke-width='9' stroke-linecap='round'%3E%3Cline x1='90' y1='38' x2='90' y2='58'/%3E%3Cline x1='90' y1='122' x2='90' y2='142'/%3E%3Cline x1='38' y1='90' x2='58' y2='90'/%3E%3Cline x1='122' y1='90' x2='142' y2='90'/%3E%3C/g%3E%3C/svg%3E"/>
<style>
/* ═══════════ THEME PALETTES (Kathy's designs) ═══════════ */
/* VINTAGE — cream · bronze · olive  (default) */
:root, :root[data-theme="vintage"]{
  --bg:#FBF6EA; --panel:#F2E9D5; --panel-2:#E8DBC0; --card:#FFFDF7;
  --text:#3B2F26; --text-2:#6E6152;
  --line:rgba(59,47,38,.12); --line-2:rgba(59,47,38,.20);
  --accent:#C9A227; --accent-lt:#E3C766; --accent-dp:#9A7A1C; --on-accent:#2A2013;
  --good:#4E7A2E; --good-bg:#EAF0DC; --bad:#B14A2A; --bad-bg:#F6E5DB;
  --bar-a:#3B2F26; --bar-b:#2A2019; --bar-text:#FBF6EA; --bar-line:#C9A227;
  --hero-a:#46382B; --hero-b:#33281E; --hero-c:#241C14; --hero-text:#FBF6EA; --hero-lbl:#E3C766;
  --word-a1:#4A3A2C; --word-a2:#2A2019; --word-b1:#7E8B57; --word-b2:#57683B;
  --lock-a:#46382B; --lock-b:#241C14;
  --badge-a:#FBF6EA; --badge-b:#EEE2C9; --badge-brd:#C9A227; --badge-ink:#3B2F26; --badge-accent:#9A7A1C;
  --shadow:0 8px 28px rgba(59,47,38,.10), 0 2px 6px rgba(59,47,38,.05);
}
/* PATRIOTIC — navy · red · cream */
:root[data-theme="patriotic"]{
  --bg:#FBF9F4; --panel:#EEF1F8; --panel-2:#E1E7F2; --card:#FFFFFF;
  --text:#15234C; --text-2:#566079;
  --line:rgba(21,35,76,.12); --line-2:rgba(21,35,76,.20);
  --accent:#C41E3A; --accent-lt:#E2465C; --accent-dp:#9A1229; --on-accent:#FFFFFF;
  --good:#1B7A3D; --good-bg:#E3F1E7; --bad:#B01E2E; --bad-bg:#FBE7E4;
  --bar-a:#16234A; --bar-b:#0E1730; --bar-text:#FBF9F4; --bar-line:#C41E3A;
  --hero-a:#1E3A6E; --hero-b:#16264C; --hero-c:#0E1730; --hero-text:#FBF9F4; --hero-lbl:#E6EBF7;
  --word-a1:#1E3A6E; --word-a2:#14264C; --word-b1:#E2465C; --word-b2:#C41E3A;
  --lock-a:#1E3A6E; --lock-b:#0E1730;
  --badge-a:#FBF9F4; --badge-b:#EAEFF8; --badge-brd:#C41E3A; --badge-ink:#15234C; --badge-accent:#C41E3A;
  --shadow:0 8px 28px rgba(21,35,76,.10), 0 2px 6px rgba(21,35,76,.05);
}
/* MIDNIGHT — black · pastel pink · mint · lavender */
:root[data-theme="midnight"]{
  --bg:#0B0B0F; --panel:#17171E; --panel-2:#20202A; --card:#16161C;
  --text:#F3EFF5; --text-2:#B7B0C2;
  --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.17);
  --accent:#F4B8C8; --accent-lt:#FAD0DC; --accent-dp:#D98BA6; --on-accent:#1A1420;
  --good:#8FE0B8; --good-bg:rgba(143,224,184,.14); --bad:#FF8497; --bad-bg:rgba(255,132,151,.14);
  --bar-a:#16161C; --bar-b:#0B0B0F; --bar-text:#F3EFF5; --bar-line:#F4B8C8;
  --hero-a:#1C1622; --hero-b:#141019; --hero-c:#0B0B0F; --hero-text:#F3EFF5; --hero-lbl:#F4B8C8;
  --word-a1:#F7C3D2; --word-a2:#E79FB6; --word-b1:#BFEEDD; --word-b2:#97E0C9;
  --lock-a:#17141C; --lock-b:#08080B;
  --badge-a:#14141A; --badge-b:#0B0B0F; --badge-brd:#F4B8C8; --badge-ink:#F3EFF5; --badge-accent:#A8E6D4;
  --shadow:0 10px 30px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.4);
}
/* back-compat aliases → resolve to whichever theme is active */
:root{
  --ink-0:var(--text); --ink-1:var(--text); --ink-2:var(--text-2);
  --cream-0:var(--bg); --cream-1:var(--panel); --cream-2:var(--panel-2);
  --gold:var(--accent); --gold-lt:var(--accent-lt); --gold-dp:var(--accent-dp);
  --green:var(--good); --green-lt:var(--good-bg); --red:var(--bad); --red-lt:var(--bad-bg);
  --blue:var(--accent-dp);
  --nav-h:74px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--cream-0); color:var(--ink-0);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-weight:600; line-height:1.4; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.serif{font-family:Georgia,'Times New Roman',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-weight:600}
::selection{background:var(--gold-lt)}
h1,h2,h3{line-height:1.15}

/* ─────────────────────────── LOCK SCREEN ─────────────────────────── */
#lock{position:fixed;inset:0;z-index:1000;background:radial-gradient(120% 90% at 50% 0%,var(--lock-a) 0%,var(--lock-b) 62%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center}
.badge{background:linear-gradient(180deg,var(--badge-a),var(--badge-b));border:3px solid var(--badge-brd);border-radius:22px;padding:20px 26px 22px;box-shadow:0 14px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);max-width:340px;width:100%}
.badge .flags{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.badge .flag{width:34px;height:22px;border:1.5px solid rgba(0,0,0,.35);border-radius:3px}
.vault-mark{width:56px;height:56px;margin:0 auto 4px;display:block}
.vault-mark circle,.vault-mark line{stroke:var(--badge-accent)}
.vault-mark circle[fill="#C6971D"]{fill:var(--badge-accent);stroke:none}
.badge .name{font-family:Georgia,serif;font-weight:700;color:var(--badge-ink);font-size:15px;letter-spacing:.5px;line-height:1.25;margin-bottom:2px}
.badge .name b{color:var(--badge-accent)}
.wordmark{font-family:Georgia,serif;font-weight:700;font-size:34px;letter-spacing:.5px;line-height:1;margin:6px 0 2px}
.wordmark .fin{background:linear-gradient(180deg,var(--word-a1),var(--word-a2) 70%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.wordmark .vault{background:linear-gradient(180deg,var(--word-b1) 0%,var(--word-b2) 75%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.badge .sub{font-size:11px;font-weight:700;color:var(--badge-ink);opacity:.75;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
#lock .prompt{color:var(--bar-text);font-size:15px;font-weight:700;margin:22px 0 16px}
.dots{display:flex;gap:16px;justify-content:center;margin-bottom:8px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--accent-lt);background:transparent;transition:.15s}
.dot.on{background:var(--accent-lt);box-shadow:0 0 14px var(--accent)}
/* theme picker on lock */
.themepick{margin-top:20px}
.tp-label{color:var(--bar-text);opacity:.85;font-size:12px;font-weight:700;margin-bottom:9px}
.tp-row{display:flex;gap:9px;justify-content:center}
.tp{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:14px;padding:9px 12px;color:var(--bar-text);font-size:11.5px;font-weight:800}
.tp.on{border-color:var(--accent-lt);background:rgba(255,255,255,.12)}
.tp .sw{width:38px;height:22px;border-radius:6px;border:1px solid rgba(255,255,255,.3)}
.sw-patriotic{background:linear-gradient(90deg,#16234A 33%,#FBF9F4 33% 66%,#C41E3A 66%)}
.sw-midnight{background:linear-gradient(90deg,#0B0B0F 30%,#F4B8C8 30% 55%,#A8E6D4 55% 80%,#C9B8E8 80%)}
.sw-vintage{background:linear-gradient(90deg,#3B2F26 33%,#C9A227 33% 66%,#6B7A4F 66%)}
#lock.err .dots{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:280px;margin:20px auto 0;width:100%}
.key{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.18);border-radius:16px;color:var(--bar-text);font-family:Georgia,serif;font-size:26px;font-weight:700;height:62px;transition:.1s}
.key:active{background:rgba(255,255,255,.16);transform:scale(.95)}
.key.blank{background:none;border:none}
.key.util{font-size:15px;font-family:inherit;color:var(--accent-lt);font-weight:700}

/* ─────────────────────────── APP SHELL ─────────────────────────── */
#app{display:none;min-height:100vh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}
#app.show{display:block}
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bar-a),var(--bar-b));color:var(--bar-text);padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--bar-line)}
.topbar .tw{font-family:Georgia,serif;font-size:21px;font-weight:700;display:flex;align-items:center;gap:7px}
.topbar .tw .vault{color:var(--accent-lt)}
.topbar .right{display:flex;align-items:center;gap:8px}
.topbar .month{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent-lt);background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:6px 10px}
.topbar .themebtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px}
.mini-vault{width:24px;height:24px}
.mini-vault circle,.mini-vault line{stroke:var(--accent-lt)}
.mini-vault circle[fill="#E9C46A"]{fill:var(--accent-lt);stroke:none}

.view{display:none;padding:18px 16px 8px;animation:fade .25s ease}
.view.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.view-title{font-family:Georgia,serif;font-size:26px;font-weight:700;margin-bottom:2px}
.view-sub{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:16px}

/* section eyebrow */
.eyebrow{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold-dp);margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
.eyebrow::after{content:'';flex:1;height:1px;background:var(--line)}

/* ─────────────────────────── CARDS ─────────────────────────── */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}

/* HERO STATEMENT CARD */
.statement{background:linear-gradient(155deg,var(--hero-a) 0%,var(--hero-b) 55%,var(--hero-c) 100%);border-radius:22px;padding:22px 22px 20px;color:var(--hero-text);position:relative;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.28)}
.statement::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent-dp),var(--accent-lt),var(--accent-dp))}
.statement .lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--hero-lbl);opacity:.95}
.statement .big{font-family:Georgia,serif;font-size:46px;font-weight:700;line-height:1;margin:8px 0 4px;letter-spacing:-.5px}
.statement .big .c{color:var(--gold-lt);font-size:26px;vertical-align:top;margin-right:2px}
.statement .row{display:flex;gap:10px;margin-top:16px}
.statement .chip{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:11px 12px}
.statement .chip .k{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.7}
.statement .chip .val{font-family:Georgia,serif;font-size:21px;font-weight:700;margin-top:3px}
.statement .chip.paid .val{color:var(--good)}
.statement .chip.owed .val{color:var(--gold-lt)}
/* progress ring inline */
.progline{margin-top:16px}
.progline .track{height:12px;border-radius:8px;background:rgba(255,255,255,.1);overflow:hidden}
.progline .fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--good),var(--good))}
.progline .cap{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-top:7px;opacity:.85}

/* KPI grid */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
.kpi .k{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-2)}
.kpi .val{font-family:Georgia,serif;font-size:26px;font-weight:700;margin-top:4px;color:var(--ink-0)}
.kpi .val.red{color:var(--red)} .kpi .val.green{color:var(--green)} .kpi .val.gold{color:var(--gold-dp)}

/* alert banner */
.alert{display:flex;align-items:center;gap:12px;background:var(--red-lt);border:1.5px solid rgba(192,57,43,.4);border-radius:16px;padding:14px 16px;margin-bottom:6px}
.alert .ic{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.alert .tx{font-size:13.5px;font-weight:700;color:#7a2018;line-height:1.35}
.alert .tx b{color:var(--red);font-family:Georgia,serif;font-size:15px}

/* ─────────────────────────── BILL ROW ─────────────────────────── */
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);text-align:left;width:100%}
.item:active{transform:scale(.995)}
.item .ic{width:44px;height:44px;flex-shrink:0;border-radius:12px;background:var(--cream-1);display:flex;align-items:center;justify-content:center;font-size:20px}
.item .mid{flex:1;min-width:0}
.item .nm{font-size:15px;font-weight:800;color:var(--ink-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{font-size:12px;font-weight:600;color:var(--ink-2);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item .amt{font-family:Georgia,serif;font-size:19px;font-weight:700;text-align:right;flex-shrink:0}
.pill{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap}
.pill.over{background:var(--red);color:#fff}
.pill.soon{background:#F4E3B8;color:#7a5a12}
.pill.paid{background:var(--green-lt);color:var(--green)}
.pill.auto{background:var(--cream-2);color:var(--ink-1)}

/* ─────────────────────────── BUTTONS ─────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;border-radius:14px;padding:14px 18px;font-size:15px;transition:transform .1s,box-shadow .12s;width:100%}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--accent-lt),var(--accent));color:var(--on-accent);box-shadow:0 6px 18px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.12)}
.cam svg,.nav .scanbtn .ring svg{stroke:var(--on-accent)}
.btn-dark{background:var(--ink-0);color:var(--cream-0)}
.btn-ghost{background:var(--card);color:var(--ink-0);border:1.5px solid var(--line-2)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--card);color:var(--red);border:1.5px solid rgba(192,57,43,.4)}
.btn-sm{padding:10px 14px;font-size:13px;border-radius:12px;width:auto}
.btn-row{display:flex;gap:10px;margin-top:14px}

/* ─────────────────────────── SCAN ─────────────────────────── */
.scan-hero{background:var(--card);border:2px dashed var(--line-2);border-radius:22px;padding:34px 22px;text-align:center;box-shadow:var(--shadow)}
.scan-hero .cam{width:70px;height:70px;margin:0 auto 14px;border-radius:50%;background:linear-gradient(135deg,var(--gold-lt),var(--gold));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(198,151,29,.4)}
.scan-hero h3{font-family:Georgia,serif;font-size:22px;font-weight:700;margin-bottom:6px}
.scan-hero p{font-size:13.5px;font-weight:600;color:var(--ink-2);max-width:280px;margin:0 auto 20px;line-height:1.5}
.scan-steps{display:flex;justify-content:center;gap:6px;margin-top:22px;flex-wrap:wrap}
.scan-steps span{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--cream-1);border-radius:20px;padding:6px 11px}
.scanning{text-align:center;padding:40px 20px}
.spinner{width:56px;height:56px;margin:0 auto 18px;border-radius:50%;border:5px solid var(--cream-2);border-top-color:var(--gold);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-preview{max-width:220px;max-height:220px;border-radius:14px;margin:0 auto 16px;display:block;box-shadow:var(--shadow);border:2px solid var(--line)}

/* ─────────────────────────── FORMS / MODAL ─────────────────────────── */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(20,17,13,.55);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.sheet{background:var(--cream-0);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.3);animation:slideup .28s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet .grip{width:44px;height:5px;border-radius:3px;background:var(--line-2);margin:0 auto 16px}
.sheet h3{font-family:Georgia,serif;font-size:22px;font-weight:700;margin-bottom:4px}
.sheet .hint{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
.field input,.field select{width:100%;background:var(--card);border:1.5px solid var(--line-2);border-radius:13px;padding:14px 14px;font-size:16px;font-weight:700;color:var(--ink-0)}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.field.two{display:flex;gap:12px}.field.two>div{flex:1}
.detail-img{width:100%;max-height:300px;object-fit:contain;border-radius:14px;background:var(--cream-1);margin-bottom:14px;border:1px solid var(--line)}
.detail-row{display:flex;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px}
.detail-row .k{font-weight:700;color:var(--ink-2)}
.detail-row .v{font-weight:800;text-align:right}

/* segmented sub-tabs (Money view) */
.seg{display:flex;background:var(--cream-1);border-radius:14px;padding:4px;margin-bottom:18px}
.seg button{flex:1;padding:10px;border-radius:11px;font-size:13.5px;font-weight:800;color:var(--ink-2)}
.seg button.on{background:var(--card);color:var(--ink-0);box-shadow:0 2px 6px rgba(20,17,13,.08)}

/* budget bar */
.bud{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
.bud .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.bud .cat{font-size:14px;font-weight:800}
.bud .nums{font-size:12.5px;font-weight:700;color:var(--ink-2)}

.bar{height:11px;border-radius:7px;background:var(--cream-1);overflow:hidden}

.vcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);text-align:left}

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIG  —  edit these two lines to turn on 2-phone sync
══════════════════════════════════════════════════════════════════ */
const CONFIG = {
  PIN: '2580',
  SCAN_ENDPOINT: '/api/scan',   // Vercel serverless function (keeps API key server-side)
  SUPABASE_URL: '',             // paste https://xxxx.supabase.co  to sync Kat & Steve's phones
  SUPABASE_ANON_KEY: '',        // paste the anon public key
  HOUSEHOLD: 'kat-steve'        // shared key so both phones see the same vault
};

/* ══════════════ STATE ══════════════ */
let state = { docs:[], expenses:[], budgets:[], debts:[] };
let pinBuf = '';
let scanImage = null;   // {data, media, preview}
let moneyTab = 'budget';
let sb = null;          // supabase client if configured

const CATS = ['Housing','Utilities','Insurance','Auto','Medical','Groceries','Dining','Phone/Internet','Subscriptions','Credit Card','Loan','Taxes','Childcare','Pets','Entertainment','Shopping','Home','Travel','Banking','Income','Savings','Personal','Other'];
const CAT_ICON = {Housing:'🏠',Utilities:'💡',Insurance:'🛡️',Auto:'🚗',Medical:'⚕️',Groceries:'🛒',Dining:'🍽️','Phone/Internet':'📶',Subscriptions:'🔁','Credit Card':'💳',Loan:'🏦',Taxes:'🧾',Childcare:'🧸',Pets:'🐾',Entertainment:'🎬',Shopping:'🛍️',Home:'🔧',Travel:'✈️',Banking:'🏦',Income:'💰',Savings:'🐷',Personal:'👤',Other:'📄'};
const TYPES = ['bill','receipt','insurance','medical','tax','banking','investment','legal','property','vehicle','warranty','id','statement','other'];
const TYPE_ICON = {bill:'🔔',receipt:'🧾',insurance:'🛡️',medical:'⚕️',tax:'🗂️',banking:'🏦',investment:'📈',legal:'⚖️',property:'🏠',vehicle:'🚗',warranty:'📃',id:'🪪',statement:'📊',other:'📄'};

/* ══════════════ STORAGE (local-first) ══════════════ */
const LS = 'financevault_v6';
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} }
function load(){
  try{ const r = localStorage.getItem(LS); if(r) state = Object.assign(state, JSON.parse(r)); }catch(e){}
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ══════════════ DATE HELPERS ══════════════ */
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function parseD(iso){ if(!iso) return null; const d=new Date(iso+'T00:00:00'); return isNaN(d)?null:d; }
function fmtD(iso){ const d=parseD(iso); if(!d) return '—'; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function daysUntil(iso){ const d=parseD(iso); if(!d) return null; return Math.round((d-today())/86400000); }
function money(n){ return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function money0(n){ return Math.round(Number(n||0)).toLocaleString('en-US'); }
function curMonthLabel(){ return new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function inCurMonth(iso){ const d=parseD(iso); if(!d) return false; const n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }

/* ══════════════ DERIVED ══════════════ */
function bills(){ return state.docs.filter(d=>d.type==='bill'); }
function overdue(){ return bills().filter(b=>!b.paid && daysUntil(b.dueDate)!==null && daysUntil(b.dueDate)<0); }
function dueSoon(){ return bills().filter(b=>!b.paid && daysUntil(b.dueDate)!==null && daysUntil(b.dueDate)>=0 && daysUntil(b.dueDate)<=7); }
function monthBills(){ return bills().filter(b=>inCurMonth(b.dueDate)); }
function sum(a,k){ return a.reduce((t,x)=>t+Number(x[k]||0),0); }

/* ══════════════ LOCK SCREEN ══════════════ */
function buildPad(){
  const pad = document.getElementById('pad');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  pad.innerHTML='';
  keys.forEach(k=>{
    const b=document.createElement('button');
    if(k===''){ b.className='key blank'; }
    else if(k==='⌫'){ b.className='key util'; b.textContent='⌫'; b.onclick=()=>{ pinBuf=pinBuf.slice(0,-1); renderDots(); }; }
    else { b.className='key'; b.textContent=k; b.onclick=()=>pressPin(k); }
    pad.appendChild(b);
  });
}
function pressPin(k){
  if(pinBuf.length>=4) return;
  pinBuf+=k; renderDots();
  if(pinBuf.length===4) setTimeout(checkPin,120);
}
function renderDots(){
  document.querySelectorAll('#lock .dot').forEach((d,i)=>d.classList.toggle('on', i<pinBuf.length));
}
function checkPin(){
  if(pinBuf===CONFIG.PIN){
    sessionStorage.setItem('fv_unlocked','1');
    unlock();
  } else {
    const lock=document.getElementById('lock');
    lock.classList.add('err');
    setTimeout(()=>{ lock.classList.remove('err'); pinBuf=''; renderDots(); },420);
  }
}
function unlock(){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('nav').style.display='flex';
  document.getElementById('topMonth').textContent=curMonthLabel();
  renderAll();
}

/* ══════════════ NAV ══════════════ */
function go(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  document.getElementById('v-'+view).classList.add('show');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.view===view));
  window.scrollTo(0,0);
  render(view);
}
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b) go(b.dataset.view);
});

/* ══════════════ RENDER DISPATCH ══════════════ */
function renderAll(){ ['home','bills','scan','money','vault'].forEach(render); }
function render(view){
  if(view==='home') renderHome();
  if(view==='bills') renderBills();
  if(view==='scan') renderScan();
  if(view==='money') renderMoney();
  if(view==='vault') renderVault();
}

/* ══════════════ HOME ══════════════ */
function renderHome(){
  const mb=monthBills();
  const paid=sum(mb.filter(b=>b.paid),'amount');
  const owed=sum(mb.filter(b=>!b.paid),'amount');
  const total=paid+owed;

  const ov=overdue();

  const debtTotal=sum(state.debts,'balance');
  const nextBill=bills().filter(b=>!b.paid&&daysUntil(b.dueDate)!==null).sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate))[0];

  let h='';
  if(ov.length){
    h+=`<div class="alert"><div class="ic">!</div><div class="tx">${ov.length} ${ov.length>1?'bills are':'bill is'} <b>overdue</b> — $${money(sum(ov,'amount'))} past due. Tap Bills to pay.</div></div>`;

    </div>
    <div class="row">
      <div class="chip paid"><div class="k">Paid</div><div class="val">$${money0(paid)}</div></div>
      <div class="chip owed"><div class="k">Owed</div><div class="val">$${money0(owed)}</div></div>
      <div class="chip"><div class="k">Bills</div><div class="val">${mb.length}</div></div>
    </div>
  </div>`;

  h+=`<div class="kpis">
    <div class="kpi"><div class="k">Documents</div><div class="val">${state.docs.length}</div></div>
    <div class="kpi"><div class="k">Overdue</div><div class="val ${ov.length?'red':''}">${ov.length}</div></div>
    <div class="kpi"><div class="k">Due this week</div><div class="val ${soon.length?'gold':''}">${soon.length}</div></div>
    <div class="kpi"><div class="k">Total debt</div><div class="val ${debtTotal?'red':'green'}">$${money0(debtTotal)}</div></div>
  </div>`;

  if(nextBill){
    const du=daysUntil(nextBill.dueDate);
    h+=`<div class="eyebrow">Next up</div>
      ${billRow(nextBill)}`;
  }

  h+=`<div class="btn-row"><button class="btn btn-gold" onclick="go('scan')">＋ Scan a bill</button><button class="btn btn-ghost" onclick="addBillForm()">Add manually</button></div>`;

  const upcoming=bills().filter(b=>!b.paid&&daysUntil(b.dueDate)!==null&&daysUntil(b.dueDate)>=0).sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate)).slice(0,4);
  if(upcoming.length){
    h+=`<div class="eyebrow">Upcoming bills</div><div class="list">${upcoming.map(billRow).join('')}</div>`;
  }

  document.getElementById('v-home').innerHTML=h;
}

      <h3 class="serif">Snap or upload</h3>

    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="addBillForm()">Type it in instead</button></div>`;

document.getElementById('fileInput').addEventListener('change',handleFile);
function handleFile(e){
  const f=e.target.files[0]; if(!f) return;
  e.target.value='';
  // Downscale + compress in the browser BEFORE upload: keeps payload well under
  // Vercel's 4.5MB body limit, speeds up scans, and lowers per-scan cost.
  downscale(f).then(img=>{ scanImage=img; runScan(); }).catch(()=>{
    const reader=new FileReader();
    reader.onload=ev=>{ scanImage={data:ev.target.result.split(',')[1],media:f.type||'image/jpeg',preview:ev.target.result}; runScan(); };
    reader.readAsDataURL(f);
  });
}
function downscale(file,max=1600,quality=0.82){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
      if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      try{ const d=c.toDataURL('image/jpeg',quality); res({data:d.split(',')[1],media:'image/jpeg',preview:d}); }
      catch(err){ rej(err); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('load')); };
    img.src=url;
  });
}
function runScan(){
  const v=document.getElementById('v-scan');
  v.innerHTML=`<div class="scanning">
    <img class="scan-preview" src="${scanImage.preview}"/>
    <div class="spinner"></div>
    <h3 class="serif" style="font-size:20px">Reading your document…</h3>
    <p style="font-size:13px;font-weight:600;color:var(--ink-2);margin-top:6px">Claude is finding the amount, due date, and vendor.</p>
  </div>`;
  scanRequest();
}
async function scanRequest(){
  try{
    const res=await fetch(CONFIG.SCAN_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:scanImage.data, media:scanImage.media})
    });
    if(!res.ok) throw new Error('scan endpoint '+res.status);
    const out=await res.json();
    scanConfirm(out);
  }catch(err){
    // graceful fallback: let them fill it in with the photo attached
    toast('Auto-read unavailable — fill it in','err');
    scanConfirm({}, true);
  }
}
function scanConfirm(data, manual){
  data=data||{};
  const type=data.docType||'bill';

  const sheet=document.getElementById('sheet');

    <div class="field two">
      <div><label>Amount ($)</label><input id="f-amount" type="number" inputmode="decimal" value="${data.amount!=null?data.amount:''}" placeholder="0.00"/></div>
      <div><label>Due date</label><input id="f-due" type="date" value="${data.dueDate||''}"/></div>
    </div>
    <div class="field"><label>Category</label><select id="f-cat">${CATS.map(c=>`<option ${c===cat?'selected':''}>${c}</option>`).join('')}</select></div>
    ${data.accountNumber?`<div class="field"><label>Account #</label><input id="f-acct" value="${esc(data.accountNumber)}"/></div>`:`<input type="hidden" id="f-acct" value=""/>`}
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveScan()">Save to vault</button></div>`;
  openModal();

function saveScan(){
  const doc={

    amount:parseFloat(val('f-amount'))||0,

function statsHTML(){
  // last 6 months of bill spend
  const now=new Date(); const buckets=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); buckets.push({key:d.getMonth()+'-'+d.getFullYear(),lbl:d.toLocaleDateString('en-US',{month:'short'}),total:0,now:i===0}); }
  state.docs.filter(d=>d.amount>0&&d.dueDate).forEach(d=>{
    const dt=parseD(d.dueDate); if(!dt) return;
    const b=buckets.find(x=>x.key===(dt.getMonth()+'-'+dt.getFullYear())); if(b) b.total+=Number(d.amount);
  });
  const max=Math.max(1,...buckets.map(b=>b.total));
  const thisM=buckets[5].total, lastM=buckets[4].total;
  const delta=lastM>0?Math.round((thisM-lastM)/lastM*100):0;
  let h=`<div class="kpis"><div class="kpi"><div class="k">This month</div><div class="val">$${money0(thisM)}</div></div>
    <div class="kpi"><div class="k">vs last month</div><div class="val ${delta>0?'red':'green'}">${delta>0?'+':''}${delta}%</div></div></div>
    <div class="eyebrow">Spending · last 6 months</div>
    <div class="card" style="padding:16px 14px 12px">
      <div class="stat-bar">${buckets.map(b=>`<div class="col"><div class="b ${b.now?'now':''}" style="height:${Math.round(b.total/max*100)}%"></div></div>`).join('')}</div>
      <div class="stat-lbls">${buckets.map(b=>`<span>${b.lbl}</span>`).join('')}</div>
    </div>
    <div class="eyebrow">Where it goes</div>`;
  const byCat={};
  state.docs.filter(d=>d.amount>0).forEach(d=>{ byCat[d.category]=(byCat[d.category]||0)+Number(d.amount); });
  const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(!top.length){ h+=emptyState('📈','Not enough data yet.'); }
  else{ const mx=Math.max(...top.map(t=>t[1])); h+='<div class="list">'+top.map(([c,v])=>`<div class="bud"><div class="top"><div class="cat">${CAT_ICON[c]||'📄'} ${c}</div><div class="nums"><b>$${money0(v)}</b></div></div><div class="bar"><div class="f" style="width:${Math.round(v/mx*100)}%"></div></div></div>`).join('')+'</div>'; }
  return h;
}

    <div class="field two"><div><label>Amount ($)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0.00"/></div>
    <div><label>Due date</label><input id="f-due" type="date"/></div></div>
    <div class="field"><label>Category</label><select id="f-cat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <input type="hidden" id="f-type" value="bill"><input type="hidden" id="f-acct" value="">
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveManualBill()">Save bill</button></div>`;

}
function saveManualBill(){
  scanImage=null;
  const doc={id:uid(),type:'bill',vendor:val('f-vendor')||'Untitled',name:val('f-vendor')||'Untitled',amount:parseFloat(val('f-amount'))||0,dueDate:val('f-due')||'',category:val('f-cat'),accountNumber:'',image:'',paid:false,autopay:false,createdAt:new Date().toISOString()};
  state.docs.unshift(doc);
  if(doc.amount>0){ state.expenses.unshift({id:uid(),category:doc.category,amount:doc.amount,note:doc.vendor,date:(doc.dueDate||new Date().toISOString().slice(0,10)),docId:doc.id}); ensureBudget(doc.category); }

function addExpenseForm(){
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="grip"></div><h3 class="serif">Log an expense</h3><div class="hint">Add spending that didn’t come from a scan.</div>
    <div class="field"><label>What was it?</label><input id="e-note" placeholder="e.g. Groceries at Smith's"/></div>
    <div class="field two"><div><label>Amount ($)</label><input id="e-amt" type="number" inputmode="decimal" placeholder="0.00"/></div>

    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveExpense()">Save</button></div>`;

function saveExpense(){
  const amt=parseFloat(val('e-amt'))||0; if(amt<=0){ toast('Enter an amount','err'); return; }
  state.expenses.unshift({id:uid(),category:val('e-cat'),amount:amt,note:val('e-note')||'Expense',date:val('e-date')||new Date().toISOString().slice(0,10)});
  ensureBudget(val('e-cat')); save(); syncPush(); closeModal(); renderMoney(); toast('Logged ✓');
}
function setLimitForm(cat){
  const cur=(state.budgets.find(b=>b.category===cat)||{}).limit||'';
  const n=prompt(`Monthly limit for ${cat} ($):`,cur);
  if(n===null) return; ensureBudget(cat);
  state.budgets.find(b=>b.category===cat).limit=parseFloat(n)||0; save(); syncPush(); renderMoney(); toast('Limit set ✓');
}
function addDebtForm(){
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="grip"></div><h3 class="serif">Add a debt</h3><div class="hint">Card, loan, or anything you’re paying down.</div>
    <div class="field"><label>Name</label><input id="d-name" placeholder="e.g. Chase Visa"/></div>
    <div class="field two"><div><label>Balance ($)</label><input id="d-bal" type="number" inputmode="decimal" placeholder="0.00"/></div>
    <div><label>Interest (APR %)</label><input id="d-apr" type="number" inputmode="decimal" placeholder="0"/></div></div>
    <div class="field"><label>Minimum payment ($)</label><input id="d-min" type="number" inputmode="decimal" placeholder="0.00"/></div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveDebt()">Save debt</button></div>`;
  openModal();
}
function saveDebt(){
  const bal=parseFloat(val('d-bal'))||0;
  state.debts.push({id:uid(),name:val('d-name')||'Debt',balance:bal,startBalance:bal,apr:parseFloat(val('d-apr'))||0,minPayment:parseFloat(val('d-min'))||0,payments:[]});
  save(); syncPush(); closeModal(); renderMoney(); toast('Debt added ✓');
}
function logPaymentForm(id){
  const d=state.debts.find(x=>x.id===id); if(!d)return;
  const n=prompt(`Payment to ${d.name} ($):`,d.minPayment||'');
  if(n===null)return; const amt=parseFloat(n)||0; if(amt<=0)return;
  d.payments=d.payments||[]; d.payments.push({amount:amt,date:new Date().toISOString().slice(0,10)});
  d.balance=Math.max(0,Number(d.balance)-amt);
  save(); syncPush(); renderMoney(); toast(d.balance<=0?'Paid off! 🎉':'Payment logged ✓');
}

/* ══════════════ MODAL / TOAST / HELPERS ══════════════ */
function openModal(){ document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });
let _tt; function toast(m,type='ok'){ const t=document.getElementById('toast'); t.textContent=m; t.className='show '+type; clearTimeout(_tt); _tt=setTimeout(()=>t.className='',2600); }
function val(id){ const el=document.getElementById(id); return el?(el.value||'').trim():''; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }
function emptyState(ic,txt){ return `<div class="empty"><div class="ic">${ic}</div><p>${txt}</p></div>`; }

/* ══════════════ OPTIONAL SUPABASE SYNC ══════════════ */
async function initSync(){
  if(!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY) return;
  try{
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
    sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
    // pull shared state
    const {data}=await sb.from('fv_state').select('data').eq('household',CONFIG.HOUSEHOLD).maybeSingle();
    if(data&&data.data){ state=Object.assign({docs:[],expenses:[],budgets:[],debts:[]},data.data); save(); renderAll(); }
    else{ await syncPush(); }
    // live updates from the other phone
    sb.channel('fv').on('postgres_changes',{event:'*',schema:'public',table:'fv_state',filter:`household=eq.${CONFIG.HOUSEHOLD}`},payload=>{
      if(payload.new&&payload.new.data){ state=Object.assign({docs:[],expenses:[],budgets:[],debts:[]},payload.new.data); save(); renderAll(); }
    }).subscribe();
  }catch(e){ console.warn('Sync off:',e); }
}
async function syncPush(){
  if(!sb) return;
  try{ await sb.from('fv_state').upsert({household:CONFIG.HOUSEHOLD,data:state,updated_at:new Date().toISOString()},{onConflict:'household'}); }catch(e){}
}
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

/* ══════════════ THEME ENGINE ══════════════ */
const THEMES={
  patriotic:{name:'Patriotic',desc:'Navy · red · cream',sw:'sw-patriotic'},
  midnight:{name:'Midnight',desc:'Black · pink · mint · lavender',sw:'sw-midnight'},
  vintage:{name:'Vintage',desc:'Cream · bronze · olive'}
};
function setTheme(t){
  if(!THEMES[t]) t='vintage';
  document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('fv_theme',t); }catch(e){}
  document.querySelectorAll('#tpRow .tp').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', getComputedStyle(document.documentElement).getPropertyValue('--bar-a').trim()||'#14110D');
  if(document.getElementById('app').classList.contains('show')){ renderAll(); }
}
function currentTheme(){ return document.documentElement.getAttribute('data-theme')||'vintage'; }
function openThemeSheet(){
  const cur=currentTheme();
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="grip"></div><h3 class="serif">Choose a look</h3><div class="hint">Kathy's three designs. Tap one — it changes everywhere instantly.</div>
    <div class="list">${Object.entries(THEMES).map(([k,v])=>`
      <button class="item" onclick="setTheme('${k}');toast('${v.name} ✓');closeModal()" style="border-color:${k===cur?'var(--accent)':'var(--line)'}">
        <span class="sw ${v.sw||'sw-vintage'}" style="width:52px;height:34px;border-radius:9px;flex-shrink:0"></span>
        <div class="mid"><div class="nm">${v.name}${k===cur?' ✓':''}</div><div class="meta">${v.desc}</div></div>
      </button>`).join('')}</div>`;
  openModal();
}
